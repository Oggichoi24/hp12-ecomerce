<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.register-box{
    background:white;
    padding:40px;
    width:320px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.register-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border:1px solid #667eea;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5563d1;
}

p{
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#667eea;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

{% for message in messages %}
  <p class="error">{{ message }}</p>
{% endfor %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p>Already have account? <a href="/login/">Login</a></p>

</div>

</body>
</html>
