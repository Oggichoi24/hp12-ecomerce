<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#6c63ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#574fd6;
}

.error{
    color:red;
    margin-top:10px;
}

</style>

</head>

<body>

    <div class="login-box">
        <h2>Login</h2>
        
        {% for message in messages %}
          <p class="error">{{ message }}</p>
        {% endfor %}
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng nhập</button>
        </form>
        
        <p>Chưa có tài khoản? <a href="/register/">Đăng ký</a></p>
        </div>

</body>
</html>
