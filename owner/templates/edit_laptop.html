<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa Laptop | MyShop Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #1a1a2e;
            --accent: #6c63ff;
            --bg: #f4f7fe;
            --card-bg: #ffffff;
            --text-main: #1a1a2e;
            --text-muted: #6b6b8d;
            --danger: #ff4757;
            --radius: 20px;
            --shadow: 0 10px 30px rgba(108, 99, 255, 0.1);
            --transition: 0.3s ease;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
        }

        .form-header p {
            color: var(--text-muted);
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #f1f1f1;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.02);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #574fd6;
            transform: translateY(-2px);
        }

        .danger-zone {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f1f1f1;
            text-align: center;
        }

        .btn-delete {
            background: none;
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-back:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1>Chỉnh sửa Laptop</h1>
                <p>Cập nhật thông tin cho <strong>{{ laptop.name }}</strong></p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" name="name" value="{{ laptop.name }}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Thương hiệu</label>
                        <input type="text" name="brand" value="{{ laptop.brand }}" required>
                    </div>
                    <div class="form-group">
                        <label>Bộ vi xử lý (CPU)</label>
                        <input type="text" name="cpu" value="{{ laptop.cpu }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>RAM (GB)</label>
                        <input type="number" name="ram" value="{{ laptop.ram }}" required>
                    </div>
                    <div class="form-group">
                        <label>Bộ nhớ (SSD/HDD GB)</label>
                        <input type="number" name="storage" value="{{ laptop.storage }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Giá bán (VND)</label>
                    <input type="number" name="price" value="{{ laptop.price }}" required>
                </div>

                <div class="form-group">
                    <label>Link ảnh sản phẩm</label>
                    <input type="url" name="image_url" value="{{ laptop.image_url|default:'' }}" placeholder="Dán link ảnh tại đây">
                </div>

                <button type="submit" class="btn-submit">Cập nhật sản phẩm</button>
            </form>

            <div class="danger-zone">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">Hành động này không thể hoàn tác</p>
                <a href="/delete/{{ laptop.id }}/" class="btn-delete" onclick="return confirm('Bạn có chắc chắn muốn xóa laptop này?')">Xóa sản phẩm này</a>
            </div>

            <a href="/admin-dashboard/laptops/" class="btn-back">← Quay lại danh sách</a>
        </div>
    </div>

</body>
</html>
